<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coffee Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            filter: brightness(40%);
            z-index: -1;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1500px;
        }
        
        .options a {
            font-family: 'Amatic SC', cursive;
            color: #fff;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 0 10px #fff;
            border-radius: 10px;
            min-width: 200px;
            text-align: center;
            padding: 15px;
            margin: 15px;
        }
        
        .options a:hover {
            background: #fff3;
        }
        
        @media (max-width: 768px) {
            .options a {
                flex-basis: 100%;
            }
        }
    </style>
</head>

<body>
    <img src="background.jpg" alt="background" class="background">
    <div class="options">
        <a target="_blank" href="capheden/">Cà phê đen</a>
        <a target="_blank" href="caphechua/">Cà phê chùa</a>
        <a target="_blank "href="skycoffee/">Sky Coffee</a>
    </div>
</body>

</html>
