<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <title>Responsive</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            margin: 0;
        }

        h1 {
            text-align: center;
            font-size: 50px;
        }

        nav {
            background: #000;
            display: flex;
            justify-content: center;
        }

        ul {
            color: #fff;
            padding: 0;
        }

        li {
            display: inline-block;
        }

        /*  */
        a {
            font-size: 50px;
            text-decoration: none;
            display: block;
            margin: 20px;
            color: black;
        }

        a:hover {
            color: red;
        }
        @media (max-width:1000px){
        h1{
            font-size:35px;}
        }
    </style>
</head>

<body>
    <header>
        <h1>Nguyễn Văn Hào </h1>
        <nav>
            <ul>
                <li>1</li>
                <li>2</li>
                <li>3</li>
                <li>4</li>
                <li>5</li>
                <li>6</li>
                <li>7</li>
                <li>8</li>
                <li>9</li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            
             <a href="chillMovie/">Chill Movie</a>
            <a href="nhakhoa/">Nha khoa</a>
            <a href="iphone/">Iphone 13</a>
            <a href="fashion/">Fashion Shop</a>
            <a href="traitamthan/">traitamthan</a>
        </section>
    </main>
</body>

</html>
